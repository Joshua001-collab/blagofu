<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLAGOFU.K API</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0c0a09;
            color: #f5f5f4;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .container {
            max-width: 800px;
            text-align: center;
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #D4A853 0%, #E8C87A 50%, #B8933F 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .subtitle {
            color: #a8a29e;
            margin-bottom: 3rem;
            font-size: 1.1rem;
        }
        .status {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 1.5rem;
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.3);
            border-radius: 9999px;
            color: #4ade80;
            font-weight: 500;
            margin-bottom: 2rem;
        }
        .status::before {
            content: '';
            width: 8px;
            height: 8px;
            background: #4ade80;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .endpoints {
            text-align: left;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1rem;
            padding: 2rem;
            margin-top: 2rem;
        }
        .endpoints h2 {
            font-size: 1.25rem;
            margin-bottom: 1rem;
            color: #D4A853;
        }
        .endpoint {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.75rem;
            border-radius: 0.5rem;
            margin-bottom: 0.5rem;
            font-family: monospace;
            font-size: 0.9rem;
        }
        .endpoint:hover {
            background: rgba(255, 255, 255, 0.05);
        }
        .method {
            padding: 0.25rem 0.75rem;
            border-radius: 0.25rem;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }
        .method.get { background: rgba(59, 130, 246, 0.2); color: #60a5fa; }
        .method.post { background: rgba(34, 197, 94, 0.2); color: #4ade80; }
        .method.put { background: rgba(234, 179, 8, 0.2); color: #facc15; }
        .method.delete { background: rgba(239, 68, 68, 0.2); color: #f87171; }
        .path {
            color: #d6d3d1;
        }
        .footer {
            margin-top: 3rem;
            color: #78716c;
            font-size: 0.875rem;
        }
        .footer a {
            color: #D4A853;
            text-decoration: none;
        }
        .footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>BLAGOFU.K</h1>
        <p class="subtitle">Backend API Server</p>
        
        <div class="status">
            Server Running
        </div>

        <div class="endpoints">
            <h2>Available Endpoints</h2>
            <div class="endpoint">
                <span class="method get">GET</span>
                <span class="path">/api/products</span>
            </div>
            <div class="endpoint">
                <span class="method get">GET</span>
                <span class="path">/api/materials</span>
            </div>
            <div class="endpoint">
                <span class="method get">GET</span>
                <span class="path">/api/gallery</span>
            </div>
            <div class="endpoint">
                <span class="method post">POST</span>
                <span class="path">/api/messages</span>
            </div>
            <div class="endpoint">
                <span class="method post">POST</span>
                <span class="path">/api/auth/login</span>
            </div>
        </div>

        <div class="footer">
            <p>Access the admin dashboard at <a href="/admin">/admin</a></p>
            <p style="margin-top: 0.5rem;">© 2024 BLAGOFU.K - Nigerian Women's Fashion</p>
        </div>
    </div>
</body>
</html>
